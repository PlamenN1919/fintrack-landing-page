<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Analytics — Вход</title>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="../app/favicon.ico">

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0b0e14;
            position: relative;
            overflow: hidden;
            color: #f0f0f5;
        }

        /* Ambient gradient blobs */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
        }
        body::before {
            width: 600px; height: 600px;
            background: rgba(108, 92, 231, 0.15);
            top: -150px; left: -100px;
            animation: floatA 18s ease-in-out infinite alternate;
        }
        body::after {
            width: 500px; height: 500px;
            background: rgba(0, 206, 201, 0.1);
            bottom: -150px; right: -80px;
            animation: floatB 20s ease-in-out infinite alternate;
        }

        @keyframes floatA {
            0%   { transform: translate(0, 0);   }
            100% { transform: translate(60px, 40px); }
        }
        @keyframes floatB {
            0%   { transform: translate(0, 0);   }
            100% { transform: translate(-50px, -60px); }
        }

        .login-container {
            background: rgba(22, 28, 40, 0.8);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            padding: 48px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow:
                0 25px 80px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(108, 92, 231, 0.08);
            max-width: 440px;
            width: 90%;
            position: relative;
            z-index: 1;
            animation: slideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6C5CE7, #4834d4);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 12px 36px rgba(108, 92, 231, 0.35);
        }

        .login-logo i {
            font-size: 30px;
            color: #fff;
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0f0f5 0%, #a29bfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: 14px;
            color: rgba(240,240,245,0.45);
            margin-top: 6px;
        }

        /* Form */
        .login-form { margin-bottom: 24px; }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(240,240,245,0.55);
            margin-bottom: 8px;
        }

        .form-input-wrapper { position: relative; }

        .form-input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(240,240,245,0.3);
            font-size: 15px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: rgba(255,255,255,0.04);
            color: #f0f0f5;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        }

        .form-input::placeholder {
            color: rgba(240,240,245,0.3);
        }

        .form-input:focus {
            outline: none;
            border-color: #6C5CE7;
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);
            background: rgba(255,255,255,0.06);
        }

        .form-input.error {
            border-color: #ff7675;
            box-shadow: 0 0 0 3px rgba(255,118,117,0.2);
        }

        .error-message {
            display: none;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(255,118,117,0.1);
            border: 1px solid rgba(255,118,117,0.25);
            border-radius: 10px;
            color: #ff7675;
            font-size: 13px;
            align-items: center;
            gap: 8px;
        }

        .error-message.show { display: flex; }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6C5CE7, #4834d4);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 24px rgba(108, 92, 231, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(108, 92, 231, 0.45);
        }

        .login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .login-footer {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .footer-link {
            color: rgba(240,240,245,0.45);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.25s;
        }
        .footer-link:hover { color: #a29bfe; }

        /* Spinner */
        .spinner {
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Mobile */
        @media (max-width: 480px) {
            .login-container { padding: 32px 24px; }
            .login-title { font-size: 22px; }
            .login-logo { width: 60px; height: 60px; border-radius: 14px; }
            .login-logo i { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-chart-line"></i>
            </div>
            <h1 class="login-title">FinTrack Analytics</h1>
            <p class="login-subtitle">Влезте в админ панела</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Имейл
                </label>
                <div class="form-input-wrapper">
                    <i class="fas fa-user-circle form-input-icon"></i>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="Въведете вашия имейл"
                        required
                        autocomplete="email"
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Парола
                </label>
                <div class="form-input-wrapper">
                    <i class="fas fa-key form-input-icon"></i>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Въведете вашата парола"
                        required
                        autocomplete="current-password"
                    >
                </div>
            </div>

            <div id="errorMessage" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Грешна парола. Моля, опитайте отново.</span>
            </div>

            <button type="submit" id="loginBtn" class="login-btn">
                <i class="fas fa-sign-in-alt"></i>
                <span id="btnText">Вход</span>
            </button>
        </form>

        <div class="login-footer">
            <a href="../index.html" class="footer-link">
                <i class="fas fa-arrow-left"></i> Обратно към сайта
            </a>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mwqbnufrszmioqbfmdxe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13cWJudWZyc3ptaW9xYmZtZHhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNDI3MDcsImV4cCI6MjA5MDgxODcwN30.jkvcGWlV499Bmxo7TgGqtRoiLcmNsIkYTWP3kR4vPNc';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form         = document.getElementById('loginForm');
        const emailInput   = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn     = document.getElementById('loginBtn');
        const btnText      = document.getElementById('btnText');
        const errorMessage = document.getElementById('errorMessage');
        const errorText    = document.getElementById('errorText');

        checkAuth();

        async function checkAuth() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) window.location.href = 'dashboard.html';
            } catch (e) { console.error('Auth check error', e); }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = emailInput.value.trim();
            const password = passwordInput.value.trim();
            if (!email || !password) { showError('Моля, въведете имейл и парола'); return; }

            setLoading(true);
            hideError();

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    showError(error.message === 'Invalid login credentials' ? 'Грешен имейл или парола' : error.message);
                    setLoading(false);
                } else if (data.session) {
                    btnText.textContent = 'Успешен вход!';
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
                }
            } catch {
                showError('Грешка при свързване със сървъра');
                setLoading(false);
            }
        });

        function setLoading(on) {
            loginBtn.disabled = on;
            btnText.innerHTML = on ? '<div class="spinner"></div>' : 'Вход';
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorMessage.classList.add('show');
            passwordInput.classList.add('error');
            emailInput.classList.add('error');
        }

        function hideError() {
            errorMessage.classList.remove('show');
            passwordInput.classList.remove('error');
            emailInput.classList.remove('error');
        }

        passwordInput.addEventListener('input', hideError);
        emailInput.addEventListener('input', hideError);
    </script>
</body>
</html>
